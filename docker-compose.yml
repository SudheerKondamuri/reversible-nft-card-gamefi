version: '3.8'

services:
  hardhat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8545:8545"  # JSON-RPC
      - "8546:8546"  # WebSocket
    environment:
      NODE_ENV: development
    volumes:
      - .:/app
      - /app/node_modules
    command: npx hardhat node
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8545"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  default:
    name: gamefi-network